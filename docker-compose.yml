services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: basalto
      POSTGRES_USER: basalto
      POSTGRES_PASSWORD: basalto_local
    ports:
      - "5432:5432"
    volumes:
      - basalto_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basalto -d basalto"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  basalto_postgres:
